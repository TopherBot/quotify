name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.22", "1.23"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Lint (go vet)
        run: go vet ./...

      - name: Staticcheck (optional, install if needed)
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
        env:
          GOFLAGS: -mod=readonly

      - name: Run unit tests with coverage
        run: |
          go test -v -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

      - name: Build binaries (linux, macOS, windows)
        run: |
          GOOS=linux GOARCH=amd64 go build -o quotify-linux-amd64 .
          GOOS=darwin GOARCH=amd64 go build -o quotify-darwin-amd64 .
          GOOS=windows GOARCH=amd64 go build -o quotify-windows-amd64.exe .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quotify-binaries-${{ matrix.go-version }}
          path: quotify-*
